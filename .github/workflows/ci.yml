name: CI-CD Full Stack Docker

on:
  push:
    branches:
      - main

jobs:

  build-backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: test15b

    steps:

      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Compilar proyecto
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t esmeraldamosquera/backend-springboot:latest .

      - name: Publicar imagen en Docker Hub
        run: docker push esmeraldamosquera/backend-springboot:latest

      - name: Verificar JAR generado
        run: ls -la target

  deploy-backend:
    needs: build-backend
    runs-on: self-hosted

    steps:
      - name: Actualizar contenedor backend
        run: |
          cd C:\Users\yurie\Downloads\proyecto_docker_compose_limpio\proyecto_docker_compose_limpio
          docker compose pull backend
          docker compose up -d backend

  build-frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend_test

    steps:

      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker frontend
        run: docker build -t esmeraldamosquera/frontend-app:latest .

      - name: Publicar imagen frontend en Docker Hub
        run: docker push esmeraldamosquera/frontend-app:latest

  deploy-frontend:
    needs: build-frontend
    runs-on: self-hosted

    steps:
      - name: Actualizar contenedor frontend
        run: |
          cd C:\Users\yurie\Downloads\proyecto_docker_compose_limpio\proyecto_docker_compose_limpio
          docker compose pull frontend
          docker compose up -d frontend