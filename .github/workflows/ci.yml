name: CI-CD Full Stack Docker

on:
  push:
    branches:
      - main

jobs:

  build-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: test15b

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Ejecutar pruebas Backend
        run: mvn test

      - name: Compilar proyecto
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Backend
        run: docker build -t esmeraldamosquera/backend-springboot:latest .

      - name: Publicar imagen Backend
        run: docker push esmeraldamosquera/backend-springboot:latest

      - name: Verificar JAR generado
        run: ls -la target

  build-frontend:
  runs-on: ubuntu-latest

  defaults:
    run:
      working-directory: frontend_test

  steps:
    - uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Construir imagen Frontend
      run: docker build -t esmeraldamosquera/frontend-app:latest .

    - name: Publicar imagen Frontend
      run: docker push esmeraldamosquera/frontend-app:latest